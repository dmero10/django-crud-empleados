{% extends 'base.html' %}

{% block content %}
<div class="container">
  <h1>Positions</h1>

  <a href="{% url 'position_create' %}" class="btn btn-primary mb-3">New Position</a>

  <ul class="list-group">
    {% for position in positions %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
      <span>
        <strong>{{ position.name }}</strong> — {{ position.description }}
      </span>
      <span>
        <a href="{% url 'position_update' position.id %}" class="btn btn-sm btn-warning">Edit</a>
        <a href="{% url 'position_delete' position.id %}" class="btn btn-sm btn-danger">Delete</a>
      </span>
    </li>
    {% empty %}
    <li class="list-group-item">No positions yet.</li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
