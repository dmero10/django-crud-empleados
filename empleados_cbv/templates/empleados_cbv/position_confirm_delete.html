{% extends 'base.html' %}

{% block content %}
<div class="container">
  <h1>Delete Position (CBV)</h1>

  <p>Are you sure you want to delete <strong>{{ position.name }}</strong>?</p>

  <form method="POST">
    {% csrf_token %}
    <button class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'position_list_cbv' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
