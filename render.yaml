databases:
  - name: djangocrud-db
    databaseName: djangocrud
    user: djangocrud

services:
  - type: web
    name: djangocrud
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn djangocrud.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: djangocrud-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
